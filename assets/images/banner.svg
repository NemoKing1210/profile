<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Banner">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1a2a"/>
      <stop offset="45%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#0e1c2b"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#66c0f4" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="400" fill="url(#sky)"/>
  <rect width="1600" height="400" fill="url(#grid)"/>
</svg>
