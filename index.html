<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Кирилл — frontend-разработчик. Vue, Nuxt, TypeScript. Профиль, стек, проекты."
    />
    <meta name="theme-color" content="#171a21" />
    <title>Кирилл · Профиль</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml" />
  </head>
  <body x-data="profilePage" x-cloak>
    <a class="skip-link" href="#main" x-text="t.ui.skipToContent"></a>

    {{> topbar }}

    <main id="main">
      {{> hero }}

      <div class="store-shell">
        {{> about }}
        {{> stack }}
        {{> projects }}
        {{> interests }}
        {{> links }}
      </div>
    </main>

    {{> footer }}

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
