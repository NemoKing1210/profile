<div
  class="achievements"
  x-show="hasAchievements"
  x-cloak
  @mouseenter="showSpeechI18n('ui.achievementsHoverTip', { holdMs: null })"
  @mouseleave="_avatarSpeechI18nPath === 'ui.achievementsHoverTip' && hideSpeech()"
  @focusin="showSpeechI18n('ui.achievementsHoverTip', { holdMs: null })"
  @focusout="
    (!$event.relatedTarget || !$el.contains($event.relatedTarget)) &&
      _avatarSpeechI18nPath === 'ui.achievementsHoverTip' &&
      hideSpeech()
  "
>
  <button
    type="button"
    class="achievements__btn"
    :class="{
      'achievements__btn--open': achievementsOpen,
      'achievements__btn--pulse': achievementBtnPulse,
    }"
    :aria-label="t.achievements.buttonLabel"
    :aria-expanded="achievementsOpen"
    aria-controls="achievements-drawer"
    @click="toggleAchievementsPanel()"
  >
    <span
      class="achievements__btn-icon"
      aria-hidden="true"
      x-html="icons.trophy"
    ></span>
  </button>
</div>
