<section class="panel" id="stack" aria-labelledby="stack-title">
  <header class="panel__head panel__head--row">
    <h2 class="panel__title" id="stack-title" x-text="stack.title"></h2>
    <p class="panel__sub" x-text="stack.eyebrow"></p>
  </header>
  <ul class="stack-cards">
    <template x-for="item in stack.items" :key="item.id">
      <li class="stack-card" :class="`stack-card--${item.tone}`">
        <div class="stack-card__top">
          <span
            class="stack-card__mark"
            :style="`--mark-fill: ${item.mark.fill}; --mark-ink: ${item.mark.ink || '#fff'}`"
            aria-hidden="true"
          >
            <svg class="stack-card__mark-icon" viewBox="0 0 24 24" focusable="false">
              <path :d="item.mark.path" fill="currentColor"></path>
            </svg>
          </span>
          <h3 class="stack-card__label" x-text="item.label"></h3>
        </div>
        <p class="stack-card__detail" x-text="item.detail"></p>
        <ul class="stack-card__techs ai-tools" :aria-label="stack.techsLabel">
          <template x-for="tech in item.techs" :key="tech.id">
            <li>
              <button
                type="button"
                class="ai-tool"
                :aria-label="spawnTechLabel(tech)"
                @click="spawnTechBall(tech)"
              >
                <span
                  class="ai-tool__icon"
                  :style="`color: ${tech.fill}`"
                  aria-hidden="true"
                >
                  <svg class="ai-tool__img" viewBox="0 0 24 24" focusable="false">
                    <path :d="tech.path" fill="currentColor"></path>
                  </svg>
                </span>
                <span class="ai-tool__name" x-text="tech.label"></span>
              </button>
            </li>
          </template>
        </ul>
      </li>
    </template>
  </ul>

  <aside
    class="stack-flip"
    x-ref="stackFlip"
    :aria-label="stack.favoriteFlip.ariaLabel"
    @mouseenter="showSpeechI18n('stack.flipSpeech', { holdMs: null })"
    @mouseleave="hideSpeech()"
    @focusin="showSpeechI18n('stack.flipSpeech', { holdMs: null })"
    @focusout="!$event.currentTarget.contains($event.relatedTarget) && hideSpeech()"
  >
    <div class="stack-flip__perspective">
      <div
        class="stack-flip__inner"
        :style="`transform: rotateX(${stackFlipDeg}deg)`"
      >
        <div
          class="stack-flip__face stack-flip__face--react"
          :aria-hidden="stackFlipDeg > 90"
        >
          <div class="stack-flip__top">
            <span
              class="stack-flip__mark"
              :style="`--mark-fill: ${stack.favoriteFlip.front.mark.fill}; --mark-ink: ${stack.favoriteFlip.front.mark.ink || '#fff'}`"
              aria-hidden="true"
            >
              <svg class="stack-flip__mark-icon" viewBox="0 0 24 24" focusable="false">
                <path :d="stack.favoriteFlip.front.mark.path" fill="currentColor"></path>
              </svg>
            </span>
            <div class="stack-flip__titles">
              <p class="stack-flip__badge" x-text="stack.favoriteFlip.front.badge"></p>
              <h3 class="stack-flip__label" x-text="stack.favoriteFlip.front.label"></h3>
            </div>
          </div>
          <p class="stack-flip__detail" x-text="stack.favoriteFlip.front.detail"></p>
        </div>
        <div
          class="stack-flip__face stack-flip__face--vue"
          :aria-hidden="stackFlipDeg <= 90"
        >
          <div class="stack-flip__top">
            <span
              class="stack-flip__mark"
              :style="`--mark-fill: ${stack.favoriteFlip.back.mark.fill}; --mark-ink: ${stack.favoriteFlip.back.mark.ink || '#fff'}`"
              aria-hidden="true"
            >
              <svg class="stack-flip__mark-icon" viewBox="0 0 24 24" focusable="false">
                <path :d="stack.favoriteFlip.back.mark.path" fill="currentColor"></path>
              </svg>
            </span>
            <div class="stack-flip__titles">
              <p class="stack-flip__badge" x-text="stack.favoriteFlip.back.badge"></p>
              <h3 class="stack-flip__label" x-text="stack.favoriteFlip.back.label"></h3>
            </div>
          </div>
          <p class="stack-flip__detail" x-text="stack.favoriteFlip.back.detail"></p>
        </div>
      </div>
    </div>
  </aside>

  <aside
    class="ai-kit"
    :aria-label="stack.toolkitLabel"
    @mouseenter="showSpeechI18n('stack.aiSpeech', { holdMs: null })"
    @mouseleave="hideSpeech()"
    @focusin="showSpeechI18n('stack.aiSpeech', { holdMs: null })"
    @focusout="!$event.currentTarget.contains($event.relatedTarget) && hideSpeech()"
  >
    <div class="ai-kit__intro">
      <span
        class="ai-kit__mark"
        :class="stack.kitMark.mono && 'ai-kit__mark--mono'"
        aria-hidden="true"
      >
        <img
          class="ai-kit__mark-img"
          :src="stack.kitMark.src"
          alt=""
          width="18"
          height="18"
          decoding="async"
        />
      </span>
      <div class="ai-kit__copy">
        <p class="ai-kit__label" x-text="stack.toolkitLabel"></p>
        <p class="ai-kit__blurb" x-text="stack.toolkitBlurb"></p>
      </div>
    </div>
    <ul class="ai-tools">
      <template x-for="tool in stack.tools" :key="tool.id">
        <li>
          <button
            type="button"
            class="ai-tool"
            :data-tool="tool.id"
            :aria-label="spawnToolLabel(tool)"
            @click="spawnAiTool(tool)"
          >
            <span
              class="ai-tool__icon"
              :class="tool.mono && 'ai-tool__icon--mono'"
              aria-hidden="true"
            >
              <img
                class="ai-tool__img"
                :src="tool.icon"
                alt=""
                width="16"
                height="16"
                decoding="async"
              />
            </span>
            <span class="ai-tool__name" x-text="tool.label"></span>
          </button>
        </li>
      </template>
    </ul>
  </aside>

  <aside
    class="stack-explore"
    :aria-label="stack.exploreLabel"
    @mouseenter="showSpeechI18n('stack.exploreSpeech', { holdMs: null })"
    @mouseleave="hideSpeech()"
    @focusin="showSpeechI18n('stack.exploreSpeech', { holdMs: null })"
    @focusout="!$event.currentTarget.contains($event.relatedTarget) && hideSpeech()"
  >
    <header class="stack-explore__head">
      <span
        class="stack-explore__mark"
        aria-hidden="true"
        x-html="icons.sparkles"
      ></span>
      <div class="stack-explore__intro">
        <p class="stack-explore__label" x-text="stack.exploreLabel"></p>
        <p class="stack-explore__blurb" x-text="stack.exploreBlurb"></p>
      </div>
    </header>
    <ul class="stack-explore__grid">
      <template x-for="item in stack.explore" :key="item.id">
        <li class="stack-explore-card" :class="`stack-explore-card--${item.tone}`">
          <div class="stack-explore-card__top">
            <button
              type="button"
              class="stack-explore-card__mark"
              :style="`--mark-fill: ${item.mark.fill}; --mark-ink: ${item.mark.ink || '#fff'}`"
              :aria-label="spawnTechLabel(item.mark)"
              @click="spawnTechBall(item.mark, { scale: 0.5 })"
            >
              <svg class="stack-explore-card__mark-icon" viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path :d="item.mark.path" fill="currentColor"></path>
              </svg>
            </button>
            <div class="stack-explore-card__titles">
              <p class="stack-explore-card__badge" x-text="item.badge"></p>
              <h3 class="stack-explore-card__label" x-text="item.label"></h3>
            </div>
          </div>
          <p class="stack-explore-card__detail" x-text="item.detail"></p>
        </li>
      </template>
    </ul>
  </aside>

  <aside
    class="stack-grow"
    :aria-label="stack.growLabel"
    @mouseenter="showSpeechI18n('stack.growSpeech', { holdMs: null })"
    @mouseleave="hideSpeech()"
    @focusin="showSpeechI18n('stack.growSpeech', { holdMs: null })"
    @focusout="!$event.currentTarget.contains($event.relatedTarget) && hideSpeech()"
  >
    <div class="stack-grow__row">
      <span
        class="stack-grow__mark"
        aria-hidden="true"
        x-html="icons.arrowTrendingUp"
      ></span>
      <div class="stack-grow__copy">
        <p class="stack-grow__label" x-text="stack.growLabel"></p>
        <p class="stack-grow__text" x-text="stack.growBlurb"></p>
      </div>
    </div>
    <ul class="stack-grow__tags" :aria-label="stack.growTagsLabel">
      <template x-for="tag in stack.growTags" :key="tag">
        <li class="stack-grow__tag" x-text="tag"></li>
      </template>
    </ul>
  </aside>
</section>
