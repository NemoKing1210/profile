<div
  class="comments-sort"
  role="group"
  :aria-label="t.comments.sortLabel"
>
  <button
    type="button"
    class="comments-sort__btn"
    :class="commentSort === 'top' && 'comments-sort__btn--active'"
    :aria-pressed="commentSort === 'top'"
    @click="setCommentSort('top')"
    x-text="t.comments.sortTop"
  ></button>
  <button
    type="button"
    class="comments-sort__btn"
    :class="commentSort === 'new' && 'comments-sort__btn--active'"
    :aria-pressed="commentSort === 'new'"
    @click="setCommentSort('new')"
    x-text="t.comments.sortNew"
  ></button>
  <button
    type="button"
    class="comments-sort__btn"
    :class="commentSort === 'controversial' && 'comments-sort__btn--active'"
    :aria-pressed="commentSort === 'controversial'"
    @click="setCommentSort('controversial')"
    x-text="t.comments.sortControversial"
  ></button>
</div>

<ul class="comment-wall" :aria-label="t.comments.wallLabel">
  <template x-for="item in commentFeed" :key="item.id">
    <li
      class="steam-comment"
      :data-comment-id="item.id"
      :class="[
        `steam-comment--${item.tone}`,
        item.live && 'steam-comment--live',
        item.depth === 1 && 'steam-comment--reply',
        item.leaving && 'steam-comment--leaving',
      ]"
      :style="`--comment-i: ${item.feedIndex}`"
      :aria-hidden="item.leaving || undefined"
    >
      <div
        class="steam-comment__avatar"
        :class="item.depth === 1 && 'steam-comment__avatar--reply'"
        :style="`background: ${item.avatarColor}`"
        aria-hidden="true"
        x-text="item.initials"
      ></div>
      <div class="steam-comment__main">
        <div class="steam-comment__meta">
          <span class="steam-comment__author" x-text="item.author"></span>
          <time class="steam-comment__when" x-text="item.when"></time>
        </div>
        <div class="steam-comment__body">
          <template x-for="(seg, si) in item.bodySegments" :key="`${item.id}-${si}`">
            <span
              :class="seg.blur && 'comment-spoiler'"
              :tabindex="seg.blur ? 0 : undefined"
              :title="seg.blur ? item.spoilerHint : undefined"
              x-text="seg.text"
            ></span>
          </template>
        </div>
        <div class="steam-comment__react" role="group" :aria-label="t.comments.reactLabel">
          <button
            type="button"
            class="steam-comment__react-btn steam-comment__react-btn--like"
            :class="item.userVote === 'up' && 'is-active'"
            :aria-label="t.comments.voteUp"
            :aria-pressed="item.userVote === 'up'"
            @click="voteComment(item.id, 'up')"
          >
            <span
              class="steam-comment__react-icon"
              aria-hidden="true"
              x-html="icons.handThumbUp"
            ></span>
            <span
              class="steam-comment__react-count"
              x-show="item.likes > 0"
              x-text="formatCommentScore(item.likes)"
            ></span>
          </button>
          <button
            type="button"
            class="steam-comment__react-btn steam-comment__react-btn--dislike"
            :class="{
              'is-active': item.userVote === 'down',
              'steam-comment__react-btn--delete': canDeleteCommentsViaDownvote,
            }"
            :aria-label="canDeleteCommentsViaDownvote ? t.comments.voteDelete : t.comments.voteDown"
            :aria-pressed="canDeleteCommentsViaDownvote ? undefined : item.userVote === 'down'"
            @click="voteComment(item.id, 'down')"
          >
            <span
              class="steam-comment__react-icon"
              aria-hidden="true"
              x-html="icons.handThumbDown"
            ></span>
            <span
              class="steam-comment__react-count"
              x-show="!canDeleteCommentsViaDownvote && item.dislikes > 0"
              x-text="formatCommentScore(item.dislikes)"
            ></span>
          </button>
        </div>
      </div>
    </li>
  </template>
</ul>
