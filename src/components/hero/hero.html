<section class="hero" id="top" aria-labelledby="hero-name">
  <div
    class="hero__banner"
    role="img"
    :aria-label="`${name} — ${t.ui.bannerAlt}`"
    :style="`--hero-banner-dark: url('${banner}'); --hero-banner-light: url('${bannerLight}')`"
  ></div>
  <div
    class="hero__physics"
    x-ref="heroPhysics"
    aria-hidden="true"
  ></div>
  <div class="hero__veil" aria-hidden="true"></div>
  <div class="hero__inner">
    <div class="hero__identity">
      <div class="hero__avatar-slot">
        <button
          type="button"
          class="hero__avatar-btn"
          @click="spawnAvatarSquare()"
          @mouseenter="showSpeechI18n('hero.avatarTip', { holdMs: null })"
          @mouseleave="hideSpeech()"
          @focusin="showSpeechI18n('hero.avatarTip', { holdMs: null })"
          @focusout="hideSpeech()"
          :aria-label="t.ui.spawnAvatar"
        >
          <img
            class="hero__avatar"
            x-ref="heroAvatar"
            :src="avatar"
            :alt="`${name} — ${t.ui.avatarAlt}`"
            width="128"
            height="128"
            draggable="false"
          />
        </button>
        {{> hero/speech-bubble modifier="hero" }}
      </div>
      <div class="hero__copy">
        <p class="hero__role" x-text="role"></p>
        <div
          class="hero__name-wrap"
          tabindex="0"
          @mouseenter="showSpeechI18n('hero.nameTip', { holdMs: null })"
          @mouseleave="hideSpeech()"
          @focusin="showSpeechI18n('hero.nameTip', { holdMs: null })"
          @focusout="hideSpeech()"
        >
          <h1 class="hero__name" id="hero-name" x-text="name"></h1>
        </div>
        <p class="hero__handle" x-text="handle"></p>
        <p class="hero__tagline" x-text="tagline"></p>
        <div class="hero__meta" :aria-label="t.hero.metaLabel">
          <template x-for="chip in metaChips" :key="chip.id">
            <span
              class="meta-chip"
              :class="`meta-chip--${chip.kind}${chipHasSpeech(chip) ? ' meta-chip--has-tip' : ''}${chip.kind === 'birth' ? ' meta-chip--party' : ''}`"
              :tabindex="chipHasSpeech(chip) || chip.kind === 'birth' ? 0 : null"
              :role="chip.kind === 'birth' ? 'button' : null"
              @click="onMetaChipActivate(chip, $event)"
              @keydown.enter.prevent="onMetaChipActivate(chip, $event)"
              @keydown.space.prevent="onMetaChipActivate(chip, $event)"
              @mouseenter="showMetaChipSpeech(chip)"
              @mouseleave="chipHasSpeech(chip) && hideSpeech()"
              @focusin="showMetaChipSpeech(chip)"
              @focusout="chipHasSpeech(chip) && hideSpeech()"
            >
              <span
                class="meta-chip__icon"
                aria-hidden="true"
                x-html="icons[chip.icon]"
              ></span>
              <span class="meta-chip__label" x-text="chip.label"></span>
            </span>
          </template>
        </div>
        <div class="hero__actions">
          <template x-for="(link, index) in primaryLinks" :key="link.href">
            <a
              class="btn"
              :class="index === 0 ? 'btn--primary' : 'btn--ghost'"
              :href="link.href"
              rel="noopener noreferrer"
            >
              <img
                class="btn__icon"
                :src="link.icon"
                alt=""
                width="16"
                height="16"
                decoding="async"
              />
              <span x-text="link.label"></span>
            </a>
          </template>
        </div>
      </div>
    </div>
  </div>
</section>
