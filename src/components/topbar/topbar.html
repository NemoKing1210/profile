<header class="topbar" :class="navOpen && 'topbar--open'">
  <div class="topbar__inner">
    <div class="brand-slot">
      <a class="brand" href="#top" @click="closeNav()">
        <img
          class="brand__mark"
          :src="favicon"
          alt=""
          width="18"
          height="18"
          decoding="async"
          aria-hidden="true"
        />
        <span class="brand__text" x-text="name"></span>
      </a>
      {{> hero/speech-bubble modifier="brand" }}
    </div>
    <nav class="nav nav--desktop" x-ref="navDesktop" :aria-label="t.ui.navLabel">
      <span
        class="nav__indicator"
        x-ref="navDesktopPill"
        aria-hidden="true"
      ></span>
      <template x-for="item in nav" :key="item.href">
        <a
          class="nav__link"
          :class="activeNavId === item.id && 'nav__link--active'"
          :href="item.href"
          :data-nav-id="item.id"
          :aria-current="activeNavId === item.id ? 'true' : null"
        >
          <span x-text="item.label"></span>
          <span
            class="nav__badge"
            x-show="item.badge != null"
            x-text="item.badge"
            x-cloak
          ></span>
        </a>
      </template>
    </nav>
    <div class="topbar__tools">
      {{> topbar/lang }}
      {{> achievements/achievements }}
      <div
        class="theme-joke"
        @mouseenter="
          showSpeechI18n(
            canUseLightTheme ? 'ui.themeHoverTip' : 'ui.themeHoverTipLocked',
            { holdMs: null }
          )
        "
        @mouseleave="
          (_avatarSpeechI18nPath === 'ui.themeHoverTip' ||
            _avatarSpeechI18nPath === 'ui.themeHoverTipLocked') &&
            hideSpeech()
        "
        @focusin="
          showSpeechI18n(
            canUseLightTheme ? 'ui.themeHoverTip' : 'ui.themeHoverTipLocked',
            { holdMs: null }
          )
        "
        @focusout="
          (!$event.relatedTarget || !$el.contains($event.relatedTarget)) &&
            (_avatarSpeechI18nPath === 'ui.themeHoverTip' ||
              _avatarSpeechI18nPath === 'ui.themeHoverTipLocked') &&
            hideSpeech()
        "
      >
        <button
          type="button"
          class="theme-joke__btn"
          :class="{
            'theme-joke__btn--flash': themeJokeFlash,
            'theme-joke__btn--spin': themeJokeSpin,
          }"
          :aria-label="themeToggleLabel"
          :aria-pressed="canUseLightTheme ? themeLight : undefined"
          :aria-expanded="canUseLightTheme ? undefined : themeJokeOpen"
          :aria-controls="canUseLightTheme ? undefined : 'theme-joke-toast'"
          @click="pokeThemeJoke()"
        >
          <span
            class="theme-joke__icon"
            aria-hidden="true"
            x-html="themeToggleIcon"
          ></span>
        </button>
        <div
          id="theme-joke-toast"
          class="theme-joke__toast"
          role="status"
          aria-live="polite"
          x-show="!canUseLightTheme && themeJokeOpen"
          x-cloak
          x-transition:enter="theme-joke-toast-motion"
          x-transition:enter-start="theme-joke-toast-motion--from"
          x-transition:enter-end="theme-joke-toast-motion--to"
          x-transition:leave="theme-joke-toast-motion theme-joke-toast-motion--leave"
          x-transition:leave-start="theme-joke-toast-motion--to"
          x-transition:leave-end="theme-joke-toast-motion--from"
        >
          <p class="theme-joke__title" x-text="t.ui.themeDeniedTitle"></p>
          <p class="theme-joke__text" x-text="t.ui.themeDenied"></p>
        </div>
      </div>
      <div
        class="topbar__status"
        x-show="status"
        x-cloak
        :class="statusGoneOffline && 'is-offline'"
        tabindex="0"
        :aria-label="statusAriaLabel"
        @mouseenter="showSpeechI18n(statusSpeechPath, { holdMs: null })"
        @mouseleave="hideSpeech()"
        @focusin="showSpeechI18n(statusSpeechPath, { holdMs: null })"
        @focusout="hideSpeech()"
      >
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text status-text--online" x-text="status"></span>
        <span
          class="status-text status-text--offline"
          x-text="t.hero.statusOffline"
          aria-hidden="true"
        ></span>
      </div>
    </div>
    <button
      type="button"
      class="topbar__burger"
      :aria-expanded="navOpen"
      aria-controls="topbar-menu"
      :aria-label="navOpen ? t.ui.menuClose : t.ui.menuOpen"
      @click="toggleNav()"
    >
      <span
        class="topbar__burger-icon"
        aria-hidden="true"
        x-html="navOpen ? icons.xMark : icons.bars3"
      ></span>
    </button>
  </div>

  <div
    class="topbar__backdrop"
    x-show="navOpen"
    x-cloak
    x-transition:enter="topbar-menu-fade"
    x-transition:enter-start="topbar-menu-fade--from"
    x-transition:enter-end="topbar-menu-fade--to"
    x-transition:leave="topbar-menu-fade"
    x-transition:leave-start="topbar-menu-fade--to"
    x-transition:leave-end="topbar-menu-fade--from"
    @click="closeNav()"
    aria-hidden="true"
  ></div>

  <div
    id="topbar-menu"
    class="topbar__panel"
    x-show="navOpen"
    x-cloak
    x-transition:enter="topbar-menu-slide"
    x-transition:enter-start="topbar-menu-slide--from"
    x-transition:enter-end="topbar-menu-slide--to"
    x-transition:leave="topbar-menu-slide"
    x-transition:leave-start="topbar-menu-slide--to"
    x-transition:leave-end="topbar-menu-slide--from"
    @keydown.escape.window="closeNav()"
  >
    <div class="topbar__panel-handle" aria-hidden="true"></div>
    <nav class="nav nav--mobile" x-ref="navMobile" :aria-label="t.ui.navLabel">
      <span
        class="nav__indicator"
        x-ref="navMobilePill"
        aria-hidden="true"
      ></span>
      <template x-for="item in nav" :key="`m-${item.href}`">
        <a
          class="nav__link nav__link--mobile"
          :class="activeNavId === item.id && 'nav__link--active'"
          :href="item.href"
          :data-nav-id="item.id"
          :aria-current="activeNavId === item.id ? 'true' : null"
          @click="closeNav()"
        >
          <span x-text="item.label"></span>
          <span
            class="nav__badge"
            x-show="item.badge != null"
            x-text="item.badge"
            x-cloak
          ></span>
        </a>
      </template>
    </nav>
  </div>
</header>
