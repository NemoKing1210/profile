<header class="topbar" :class="navOpen && 'topbar--open'">
  <div class="topbar__inner">
    <div class="brand-slot">
      <a class="brand" href="#top" @click="closeNav()">
        <img
          class="brand__mark"
          :src="favicon"
          alt=""
          width="18"
          height="18"
          decoding="async"
          aria-hidden="true"
        />
        <span class="brand__text" x-text="name"></span>
      </a>
      {{> hero/speech-bubble modifier="brand" }}
    </div>
    <nav class="nav nav--desktop" :aria-label="t.ui.navLabel">
      <template x-for="item in nav" :key="item.href">
        <a class="nav__link" :href="item.href">
          <span x-text="item.label"></span>
          <span
            class="nav__badge"
            x-show="item.badge != null"
            x-text="item.badge"
            x-cloak
          ></span>
        </a>
      </template>
    </nav>
    <div class="topbar__tools">
      {{> topbar/lang }}
      <div class="theme-joke">
        <button
          type="button"
          class="theme-joke__btn"
          :class="themeJokeFlash && 'theme-joke__btn--flash'"
          :aria-label="t.ui.themeToggle"
          :aria-expanded="themeJokeOpen"
          aria-controls="theme-joke-toast"
          @click="pokeThemeJoke()"
        >
          <span
            class="theme-joke__icon"
            aria-hidden="true"
            x-html="icons.sun"
          ></span>
        </button>
        <div
          id="theme-joke-toast"
          class="theme-joke__toast"
          role="status"
          aria-live="polite"
          x-show="themeJokeOpen"
          x-cloak
        >
          <p class="theme-joke__title" x-text="t.ui.themeDeniedTitle"></p>
          <p class="theme-joke__text" x-text="t.ui.themeDenied"></p>
        </div>
      </div>
      <div
        class="topbar__status"
        x-show="status"
        x-cloak
        tabindex="0"
        :aria-label="`${status}. ${t.hero.statusLastSeen}`"
        @mouseenter="showSpeechI18n('hero.statusLastSeen', { holdMs: null })"
        @mouseleave="hideSpeech()"
        @focusin="showSpeechI18n('hero.statusLastSeen', { holdMs: null })"
        @focusout="hideSpeech()"
      >
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text status-text--online" x-text="status"></span>
        <span
          class="status-text status-text--offline"
          x-text="t.hero.statusOffline"
          aria-hidden="true"
        ></span>
      </div>
    </div>
    <button
      type="button"
      class="topbar__burger"
      :aria-expanded="navOpen"
      aria-controls="topbar-menu"
      :aria-label="navOpen ? t.ui.menuClose : t.ui.menuOpen"
      @click="toggleNav()"
    >
      <span
        class="topbar__burger-icon"
        aria-hidden="true"
        x-html="navOpen ? icons.xMark : icons.bars3"
      ></span>
    </button>
  </div>

  <div
    class="topbar__backdrop"
    x-show="navOpen"
    x-cloak
    @click="closeNav()"
    aria-hidden="true"
  ></div>

  <div
    id="topbar-menu"
    class="topbar__panel"
    x-show="navOpen"
    x-cloak
    @keydown.escape.window="closeNav()"
  >
    <nav class="nav nav--mobile" :aria-label="t.ui.navLabel">
      <template x-for="item in nav" :key="`m-${item.href}`">
        <a
          class="nav__link nav__link--mobile"
          :href="item.href"
          @click="closeNav()"
        >
          <span x-text="item.label"></span>
          <span
            class="nav__badge"
            x-show="item.badge != null"
            x-text="item.badge"
            x-cloak
          ></span>
        </a>
      </template>
    </nav>
  </div>
</header>
