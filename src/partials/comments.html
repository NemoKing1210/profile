<section class="panel panel--comments" id="comments" aria-labelledby="comments-title">
  <header class="panel__head panel__head--row">
    <h2 class="panel__title" id="comments-title" x-text="t.comments.title"></h2>
    <p class="comments-count" x-text="commentsCountLabel"></p>
  </header>

  <ul class="comment-wall" :aria-label="t.comments.wallLabel">
    <template x-for="item in commentFeed" :key="item.id">
      <li
        class="steam-comment"
        :class="[
          `steam-comment--${item.tone}`,
          item.live && 'steam-comment--live',
        ]"
      >
        <div
          class="steam-comment__avatar"
          :style="`background: ${item.avatarColor}`"
          aria-hidden="true"
          x-text="item.initials"
        ></div>
        <div class="steam-comment__main">
          <div class="steam-comment__meta">
            <span class="steam-comment__author" x-text="item.author"></span>
            <time class="steam-comment__when" x-text="item.when"></time>
          </div>
          <div class="steam-comment__body">
            <template x-for="(seg, si) in item.bodySegments" :key="`${item.id}-${si}`">
              <span
                :class="seg.blur && 'comment-spoiler'"
                :tabindex="seg.blur ? 0 : undefined"
                :title="seg.blur ? item.spoilerHint : undefined"
                x-text="seg.text"
              ></span>
            </template>
          </div>
        </div>
      </li>
    </template>
  </ul>

  <div class="comments-invite">
    <p class="comments-invite__title" x-text="t.comments.inviteTitle"></p>
    <p class="comments-invite__blurb" x-text="t.comments.inviteBlurb"></p>
  </div>

  <form
    class="comments-form"
    @submit.prevent="submitComment"
    :aria-busy="commentSubmitting"
  >
    <div class="comments-form__row">
      <label class="comments-field">
        <span class="comments-field__label" x-text="t.comments.nameLabel"></span>
        <input
          class="comments-field__input"
          type="text"
          name="name"
          autocomplete="nickname"
          maxlength="80"
          required
          :disabled="commentSubmitting"
          x-model="commentDraft.name"
          :placeholder="t.comments.namePlaceholder"
        />
      </label>
    </div>

    <label class="comments-field">
      <span class="comments-field__label" x-text="t.comments.messageLabel"></span>
      <div class="comments-field__wrap">
        <textarea
          class="comments-field__input comments-field__input--area"
          name="message"
          rows="4"
          maxlength="600"
          required
          :disabled="commentSubmitting || commentRepLocked"
          x-model="commentDraft.message"
          @input="onCommentMessageInput()"
          :placeholder="t.comments.messagePlaceholder"
          :aria-describedby="commentRepLocked ? 'comment-rep-tooltip' : undefined"
        ></textarea>
        <div
          id="comment-rep-tooltip"
          class="comments-rep-tooltip"
          x-show="commentRepLocked"
          x-cloak
          x-transition.opacity.duration.200ms
          role="status"
          aria-live="polite"
        >
          <p
            class="comments-rep-tooltip__title"
            x-text="t.comments.minusRepTitle"
          ></p>
          <p
            class="comments-rep-tooltip__text"
            x-text="commentMinusRepHint"
          ></p>
        </div>
      </div>
    </label>

    <div class="comments-form__actions">
      <button
        class="btn btn--primary"
        type="submit"
        :disabled="commentSubmitting || commentRepLocked"
        x-text="commentSubmitting ? t.comments.sending : t.comments.submit"
      ></button>
    </div>

    <div
      class="comments-progress"
      x-show="commentSubmitting && !commentFinale"
      x-cloak
      role="progressbar"
      :aria-valuenow="Math.floor(commentProgress)"
      aria-valuemin="0"
      aria-valuemax="100"
      :aria-label="t.comments.progressLabel"
    >
      <div class="comments-progress__meta">
        <span x-text="commentProgressStatus"></span>
        <span
          class="comments-progress__pct"
          x-text="`${commentProgress.toFixed(1)}%`"
        ></span>
      </div>
      <div class="comments-progress__track">
        <div
          class="comments-progress__fill"
          :style="`width: ${commentProgress}%`"
        ></div>
      </div>
    </div>

    <div
      class="comments-finale"
      x-show="commentFinale"
      x-cloak
      role="status"
    >
      <p class="comments-finale__title" x-text="t.comments.finaleTitle"></p>
      <p class="comments-finale__body" x-text="commentWaitTaunt"></p>
    </div>
  </form>
</section>
