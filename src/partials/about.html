<section class="panel" id="about" aria-labelledby="about-title">
  <header class="panel__head panel__head--row">
    <h2 class="panel__title" id="about-title" x-text="about.title"></h2>
    <p class="about-eyebrow" x-text="about.eyebrow"></p>
  </header>

  <ul class="about-badges" :aria-label="about.badgesLabel">
    <template x-for="badge in about.badges" :key="badge.id">
      <li
        class="about-badge"
        :class="`about-badge--${badge.tone}`"
        x-text="badge.label"
      ></li>
    </template>
  </ul>

  <div class="about-body prose">
    <p class="about-lead" x-html="about.lead"></p>
    <template x-for="(paragraph, index) in about.paragraphs" :key="index">
      <p x-html="paragraph"></p>
    </template>
  </div>

  <aside class="about-status" :aria-label="about.statusLabel">
    <p class="about-status__eyebrow" x-text="about.statusLabel"></p>
    <div class="about-status__pair">
      <div class="about-status__card about-status__card--closed">
        <span
          class="about-status__icon"
          aria-hidden="true"
          x-html="icons.briefcase"
        ></span>
        <div class="about-status__copy">
          <span
            class="about-status__badge"
            x-text="about.statusWorkBadge"
          ></span>
          <p class="about-status__line" x-text="about.statusWork"></p>
          <p class="about-status__note" x-text="about.statusWorkNote"></p>
        </div>
      </div>
      <div class="about-status__card about-status__card--open">
        <span
          class="about-status__icon"
          aria-hidden="true"
          x-html="icons.faceSmile"
        ></span>
        <div class="about-status__copy">
          <span
            class="about-status__badge"
            x-text="about.statusHappyBadge"
          ></span>
          <p class="about-status__line" x-text="about.statusHappy"></p>
          <p class="about-status__note" x-text="about.statusHappyNote"></p>
        </div>
      </div>
    </div>
    <p class="about-status__punch" x-text="about.statusPunch"></p>
  </aside>
</section>
