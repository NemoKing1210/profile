<header class="topbar" :class="navOpen && 'topbar--open'">
  <div class="topbar__inner">
    <a class="brand" href="#top" @click="closeNav()">
      <img
        class="brand__mark"
        :src="favicon"
        alt=""
        width="18"
        height="18"
        decoding="async"
        aria-hidden="true"
      />
      <span class="brand__text" x-text="name"></span>
    </a>
    <nav class="nav nav--desktop" :aria-label="t.ui.navLabel">
      <template x-for="item in nav" :key="item.href">
        <a class="nav__link" :href="item.href">
          <span x-text="item.label"></span>
          <span
            class="nav__badge"
            x-show="item.badge != null"
            x-text="item.badge"
            x-cloak
          ></span>
        </a>
      </template>
    </nav>
    <div class="topbar__tools">
      <div
        class="lang-switch"
        @keydown.escape.window="closeLangMenu()"
        @click.outside="closeLangMenu()"
      >
        <button
          type="button"
          class="lang-switch__btn"
          :class="langMenuOpen && 'lang-switch__btn--open'"
          :aria-label="t.ui.langLabel"
          :aria-expanded="langMenuOpen"
          aria-haspopup="listbox"
          aria-controls="lang-switch-menu"
          @click="toggleLangMenu()"
        >
          <img
            class="lang-switch__flag"
            :src="currentLocaleOption.flag"
            alt=""
            width="18"
            height="12"
            decoding="async"
            aria-hidden="true"
          />
          <span
            class="lang-switch__code"
            x-text="currentLocaleOption.code"
          ></span>
          <span
            class="lang-switch__chevron"
            aria-hidden="true"
            x-html="langMenuOpen ? icons.chevronUp : icons.chevronDown"
          ></span>
        </button>
        <ul
          id="lang-switch-menu"
          class="lang-switch__menu"
          role="listbox"
          :aria-label="t.ui.langLabel"
          x-show="langMenuOpen"
          x-cloak
        >
          <template x-for="option in localeList" :key="option.code">
            <li role="presentation">
              <button
                type="button"
                class="lang-switch__option lang-option"
                role="option"
                :aria-selected="locale === option.code"
                :class="locale === option.code && 'lang-switch__option--active'"
                @click="pickLocale(option.code)"
              >
                <img
                  class="lang-switch__flag"
                  :src="option.flag"
                  alt=""
                  width="18"
                  height="12"
                  decoding="async"
                  aria-hidden="true"
                />
                <span
                  class="lang-switch__name"
                  x-text="option.nativeName"
                ></span>
              </button>
            </li>
          </template>
        </ul>
      </div>
      <div class="theme-joke">
        <button
          type="button"
          class="theme-joke__btn"
          :class="themeJokeFlash && 'theme-joke__btn--flash'"
          :aria-label="t.ui.themeToggle"
          :aria-expanded="themeJokeOpen"
          aria-controls="theme-joke-toast"
          @click="pokeThemeJoke()"
        >
          <span
            class="theme-joke__icon"
            aria-hidden="true"
            x-html="icons.sun"
          ></span>
        </button>
        <div
          id="theme-joke-toast"
          class="theme-joke__toast"
          role="status"
          aria-live="polite"
          x-show="themeJokeOpen"
          x-cloak
        >
          <p class="theme-joke__title" x-text="t.ui.themeDeniedTitle"></p>
          <p class="theme-joke__text" x-text="t.ui.themeDenied"></p>
        </div>
      </div>
      <div
        class="topbar__status"
        x-show="status"
        x-cloak
        tabindex="0"
        :aria-label="`${status}. ${t.hero.statusLastSeen}`"
      >
        <span class="status-dot" aria-hidden="true"></span>
        <span class="status-text status-text--online" x-text="status"></span>
        <span
          class="status-text status-text--offline"
          x-text="t.hero.statusOffline"
          aria-hidden="true"
        ></span>
        <span
          class="topbar__status-tip"
          role="tooltip"
          x-text="t.hero.statusLastSeen"
        ></span>
      </div>
    </div>
    <button
      type="button"
      class="topbar__burger"
      :aria-expanded="navOpen"
      aria-controls="topbar-menu"
      :aria-label="navOpen ? t.ui.menuClose : t.ui.menuOpen"
      @click="toggleNav()"
    >
      <span
        class="topbar__burger-icon"
        aria-hidden="true"
        x-html="navOpen ? icons.xMark : icons.bars3"
      ></span>
    </button>
  </div>

  <div
    class="topbar__backdrop"
    x-show="navOpen"
    x-cloak
    @click="closeNav()"
    aria-hidden="true"
  ></div>

  <div
    id="topbar-menu"
    class="topbar__panel"
    x-show="navOpen"
    x-cloak
    @keydown.escape.window="closeNav()"
  >
    <nav class="nav nav--mobile" :aria-label="t.ui.navLabel">
      <template x-for="item in nav" :key="`m-${item.href}`">
        <a
          class="nav__link nav__link--mobile"
          :href="item.href"
          @click="closeNav()"
        >
          <span x-text="item.label"></span>
          <span
            class="nav__badge"
            x-show="item.badge != null"
            x-text="item.badge"
            x-cloak
          ></span>
        </a>
      </template>
    </nav>
  </div>
</header>
