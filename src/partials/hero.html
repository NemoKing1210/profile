<section class="hero" id="top" aria-labelledby="hero-name">
  <div
    class="hero__banner"
    role="img"
    :aria-label="`${name} — ${t.ui.bannerAlt}`"
    :style="`background-image: url('${banner}')`"
  ></div>
  <div
    class="hero__physics"
    x-ref="heroPhysics"
    aria-hidden="true"
  ></div>
  <div class="hero__veil" aria-hidden="true"></div>
  <div class="hero__inner">
    <div class="hero__identity">
      <div class="hero__avatar-slot">
        <button
          type="button"
          class="hero__avatar-btn"
          @click="spawnAvatarSquare()"
          :aria-label="t.ui.spawnAvatar"
        >
          <img
            class="hero__avatar"
            :src="avatar"
            :alt="`${name} — ${t.ui.avatarAlt}`"
            width="128"
            height="128"
            draggable="false"
          />
        </button>
        <div
          class="hero__speech"
          x-show="avatarSpeechOpen"
          x-cloak
          role="status"
          aria-live="polite"
        >
          <p class="hero__speech-text">
            <span x-text="avatarSpeechText"></span><span
              class="hero__speech-caret"
              x-show="avatarSpeechTyping"
              aria-hidden="true"
            ></span>
          </p>
        </div>
      </div>
      <div class="hero__copy">
        <p class="hero__role" x-text="role"></p>
        <div
          class="hero__name-wrap"
          tabindex="0"
          aria-describedby="hero-name-tip"
        >
          <h1 class="hero__name" id="hero-name" x-text="name"></h1>
          <span
            class="hero__name-tip"
            id="hero-name-tip"
            role="tooltip"
            x-text="t.hero.nameTip"
          ></span>
        </div>
        <p class="hero__handle" x-text="handle"></p>
        <p class="hero__tagline" x-text="tagline"></p>
        <div class="hero__meta" :aria-label="t.hero.metaLabel">
          <template x-for="chip in metaChips" :key="chip.id">
            <span
              class="meta-chip"
              :class="`meta-chip--${chip.kind}${chip.tip ? ' meta-chip--has-tip' : ''}`"
              :tabindex="chip.tip ? 0 : null"
              :aria-describedby="chip.tip ? `meta-tip-${chip.id}` : null"
            >
              <span
                class="meta-chip__icon"
                aria-hidden="true"
                x-html="icons[chip.icon]"
              ></span>
              <span class="meta-chip__label" x-text="chip.label"></span>
              <span
                class="meta-chip__tip"
                x-show="chip.tip"
                :id="chip.tip ? `meta-tip-${chip.id}` : null"
                role="tooltip"
                x-text="chip.tip"
              ></span>
            </span>
          </template>
        </div>
        <div class="hero__actions">
          <template x-for="(link, index) in primaryLinks" :key="link.href">
            <a
              class="btn"
              :class="index === 0 ? 'btn--primary' : 'btn--ghost'"
              :href="link.href"
              rel="noopener noreferrer"
            >
              <img
                class="btn__icon"
                :src="link.icon"
                alt=""
                width="16"
                height="16"
                decoding="async"
              />
              <span x-text="link.label"></span>
            </a>
          </template>
        </div>
      </div>
    </div>
  </div>
</section>
